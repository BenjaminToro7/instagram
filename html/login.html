<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="contenedor">

    <!-- CELULAR -->
    <div class="telefono">

    <div class="notch"></div>

    <div class="pantalla">

        <div class="app-header">
            <h3>Instagram</h3>
        </div>

        <div class="stories">

            <div class="story">
                <div class="avatar"></div>
            </div>

            <div class="story">
                <div class="avatar"></div>
            </div>

            <div class="story">
                <div class="avatar"></div>
            </div>

            <div class="story">
                <div class="avatar"></div>
            </div>

        </div>

        <div class="post">

            <div class="post-header">
                <div class="mini-avatar"></div>
                <span>usuario</span>
            </div>

            <div class="post-image"></div>

            <div class="likes">
                ❤️ 2.350 Me gusta
            </div>

        </div>

        <div class="navbar">
            🏠 🔍 ➕ ❤️ 👤
        </div>

    </div>

</div>

    <!-- LOGIN -->
    <div class="login">

        <h1>Instagram</h1>

        <form id="loginForm">

            <input
                type="text"
                id="usuario"
                placeholder="Usuario o correo"
            >

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
            >

            <button type="submit">
                <a href="home.html">Iniciar sesión</a>
            </button>

            <p id="mensaje"></p>

        </form>

        <div class="registro">
            ¿No tienes cuenta?
            <a href="registro.html">
                Regístrate
            </a>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
