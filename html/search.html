<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar - Instagram</title>
  <link rel="stylesheet" href="../css/search.css">
</head>
<body>

<div class="todo">

  <!-- CONTENIDO PRINCIPAL -->
  <div class="contenido">

    <!-- BARRA DE BUSQUEDA -->
    <div class="search-container">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="15" y1="15" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar usuarios...">
      </div>
    </div>

    <!-- LISTA DE USUARIOS -->
    <div id="userList" class="user-list"></div>

    <!-- SECCION EXPLORAR -->
    <div class="explore-section">
      <h2 class="explore-title">Explorar</h2>
      <div class="explore-grid">
        <div class="grid-item big">
          <img src="../imagenes/publicacion_m30m.png" alt="Publicacion">
        </div>
        <div class="grid-item">
          <img src="../imagenes/publicacion_matemagia.png" alt="Publicacion">
        </div>
        <div class="grid-item">
          <img src="../imagenes/m30m.jpg" alt="Publicacion">
        </div>
        <div class="grid-item wide">
          <img src="../imagenes/matemagia.png" alt="Publicacion">
        </div>
        <div class="grid-item">
          <img src="../img/perfiles/arturo.jpg" alt="Publicacion">
        </div>
        <div class="grid-item tall">
          <img src="../img/perfiles/viajes.jpg" alt="Publicacion">
        </div>
        <div class="grid-item">
          <img src="../img/perfiles/starsmusic.jpg" alt="Publicacion">
        </div>
      </div>
    </div>

  </div>

</div>

<script src="../js/search.js"></script>
</body>
</html>
