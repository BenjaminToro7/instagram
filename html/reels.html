<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels</title>
    <link rel="stylesheet" href="../css/reels.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
<div class="contenedor">
    <!-- REEL 1 -->
    <section class="reel">
        <video loop playsinline>
            <source src="../img/videos/10formas.mp4" type="video/mp4">
        </video>
        <div class="corazon">
            <i class="fa-solid fa-heart"></i>
        </div>
        <div class="info">
            <h3>@matemagia</h3>
            <p>10 formas de aprender mejor 📚</p>
        </div>
        <div class="acciones">
            <div class="boton like">
                <i class="fa-regular fa-heart"></i>
                <span>15k</span>
            </div>
            <div class="boton">
                <i class="fa-regular fa-comment"></i>
                <span>120</span>
            </div>
            <div class="boton">
                <i class="fa-solid fa-user-plus"></i>
                <span>Seguir</span>
            </div>
        </div>
    </section>
